<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>Accordion</title>
	<link href="accordion.css" rel="stylesheet" type="text/css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>

	<h1>Simple Accordions</h1>

	<div id="accordionGroup" class="accordion">

		<h2>
			<!-- Fixed: added aria-expanded and aria-controls to connect button with panel -->
			<button type="button" class="accordion-trigger" id="accordion1id" aria-expanded="false"
				aria-controls="sect1">
				<span class="accordion-title">
					Website Design and Development
					<span class="accordion-icon"></span>
				</span>
			</button>
		</h2>

		<!-- Fixed: added aria-labelledby and hidden so screen readers can identify the panel and its state -->
		<div id="sect1" role="region" class="accordion-panel" aria-labelledby="accordion1id" hidden>
			<div>
				<p>
					Whether you need a wordpress website, a shopify site, or a custom fullstack application, we got you!
				</p>
			</div>
		</div>

		<h2>
			<!-- Fixed: added aria-expanded and aria-controls -->
			<button type="button" class="accordion-trigger" id="accordion2id" aria-expanded="false"
				aria-controls="sect2">
				<span class="accordion-title">
					Website Analytics and Performance
					<span class="accordion-icon"></span>
				</span>
			</button>
		</h2>

		<!-- Fixed: added aria-labelledby to associate panel with button -->
		<div id="sect2" role="region" class="accordion-panel" aria-labelledby="accordion2id" hidden>
			<div>
				<p>
					We believe that in order to have a successful website, you need to constantly adjust and adapt...
				</p>
			</div>
		</div>

		<h2>
			<!-- Fixed: added aria-expanded and aria-controls -->
			<button type="button" class="accordion-trigger" id="accordion3id" aria-expanded="false"
				aria-controls="sect3">
				<span class="accordion-title">
					Digital Marketing
					<span class="accordion-icon"></span>
				</span>
			</button>
		</h2>

		<!-- Fixed: added aria-labelledby to associate panel with button -->
		<div id="sect3" role="region" class="accordion-panel" aria-labelledby="accordion3id" hidden>
			<div>
				<p>
					We know that every great website focuses on helping you get more business...
				</p>
			</div>
		</div>

	</div>

	<script src="accordion.js"></script>

</body>

</html>
